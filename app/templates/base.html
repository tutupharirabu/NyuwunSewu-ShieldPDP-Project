<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "NyuwunSewu" }}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5d6977;
        --line: #d8dee6;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --accent: #0f766e;
        --warn: #b45309;
        --danger: #b42318;
        --ok: #15803d;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        letter-spacing: 0;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      .bar, main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px 20px;
      }
      .brand {
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      .brand h1 {
        font-size: 20px;
        margin: 0;
      }
      .brand span { color: var(--muted); font-size: 13px; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .metric {
        font-size: 30px;
        line-height: 1.1;
        font-weight: 720;
      }
      .label {
        color: var(--muted);
        font-size: 13px;
        margin-top: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
      }
      th, td {
        text-align: left;
        padding: 10px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
      }
      .section-title {
        font-size: 16px;
        margin: 24px 0 10px;
      }
      .score-ok { color: var(--ok); }
      .score-warn { color: var(--warn); }
      .score-danger { color: var(--danger); }
      @media (max-width: 640px) {
        .bar, main { padding: 14px; }
        .metric { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="bar">
        <div class="brand">
          <h1>NyuwunSewu</h1>
          <span>Compliance-driven security validation</span>
        </div>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
